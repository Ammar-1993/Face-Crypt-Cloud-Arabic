<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <title>سحابة الملامح المشفرة</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- رابط ملف CSS المخصص -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/user_portal.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div style="text-align:center; margin: 30px 0;">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="FaceCrypt Logo" width="180">
  </div>
  <div class="container">
    <h1>سحابة الملامح المشفرة - بوابة المستخدم</h1>
    <p>تسجيل الدخول الآمن ببصمة الوجه</p>

    <!-- Input Options Section (Camera OR File Upload) -->
    <div class="row align-items-center mt-4 mb-4">
      <div class="col-md-5">
        <button id="openCamera" class="btn btn-primary w-100 py-2">📷 فتح الكاميرا</button>
      </div>
      <div class="col-md-2 text-center my-3 my-md-0 text-muted fw-bold fs-5">
        أو
      </div>
      <div class="col-md-5">
        <label for="imageUpload" class="btn btn-outline-secondary w-100 py-2 m-0" id="userFileLabel">📁 اختر صورة من الجهاز...</label>
        <input type="file" id="imageUpload" accept="image/*" style="display: none;" />
      </div>
    </div>

    <!-- Camera Video Stream Area (Appears Below when Active) -->
    <div class="text-center">
      <video id="cameraStream" class="rounded shadow-sm" width="100%" style="max-width:300px; display:none;" autoplay playsinline></video>
      <div class="mt-2">
        <button id="captureButton" class="btn btn-warning" style="display:none;">📸 التقاط</button>
        <button id="stopCameraButton" class="btn btn-secondary" style="display:none;">✖️ إيقاف الكاميرا</button>
      </div>
    </div>

    <!-- Preview -->
    <img id="preview" src="#" alt="معاينة" style="display:none;">

    <!-- Send -->
    <button id="sendButton" class="btn btn-success mt-3">✅ إرسال للتحقق</button>

    <!-- Result -->
    <div id="result" class="mt-3"></div>
  </div>

  <!-- رابط ملف JS المخصص -->
  <script src="{{ url_for('static', filename='js/user_portal.js') }}"></script>
</body>

</html>
