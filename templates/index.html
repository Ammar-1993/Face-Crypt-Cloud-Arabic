<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <title>سحابة الملامح المشفرة</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- رابط ملف CSS المخصص -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/user_portal.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div style="text-align:center; margin: 30px 0;">
    <img src="{{ url_for('static', filename='images/face_crypt_cloud_logo.png') }}" alt="FaceCrypt Logo" width="180">
  </div>
  <div class="container">
    <h1>سحابة الملامح المشفرة - بوابة المستخدم</h1>
    <p>تسجيل الدخول الآمن ببصمة الوجه</p>

    <!-- Main Action: Open Camera -->
    <div class="d-grid gap-2 col-8 col-md-6 mx-auto mt-4">
      <button id="openCamera" class="btn btn-primary btn-lg py-3">📷 فتح الكاميرا للتحقق</button>
    </div>

    <!-- Camera and Preview Container -->
    <div id="cameraContainer" class="text-center mt-4">
      <video id="cameraStream" class="rounded shadow-sm border" width="100%" style="max-width:400px; display:none;"
        autoplay playsinline></video>
      <img id="preview" class="rounded shadow-sm border" src="#" alt="معاينة"
        style="display:none; max-width:400px; width:100%;">

      <div class="mt-3">
        <button id="captureButton" class="btn btn-warning btn-lg" style="display:none;">📸 التقاط الصورة</button>
        <button id="stopCameraButton" class="btn btn-secondary" style="display:none;">✖️ إغلاق الكاميرا</button>
      </div>
    </div>

    <!-- Final Submission and Retake Actions -->
    <div class="d-flex justify-content-center gap-3 mt-4">
      <button id="sendButton" class="btn btn-success btn-lg" style="display:none;">✅ إرسال للتحقق</button>
      <button id="retakeButton" class="btn btn-outline-danger btn-lg" style="display:none;">🔄 إعادة التقاط</button>
      <button type="button" class="btn btn-outline-secondary btn-lg" id="btnCancelCamera" style="display: none;">إلغاء ✖️</button>
    </div>

    <!-- Result -->
    <div id="result" class="mt-4"></div>

    <!-- Security Disclaimer -->
    <div class="mt-4 text-center text-secondary" style="font-size: 0.85rem; line-height: 1.6;">
      <span title="سياسة الأمان">🛡️ <strong>حماية الحساب:</strong></span><br>
      <span class="text-muted">٣ محاولات فاشلة = حظر مؤقت (٥ دقائق).</span><br>
      <span class="text-muted">٥ محاولات فاشلة = حظر دائم (يتطلب مراجعة مسؤول النظام).</span>
    </div>
  </div>

  <!-- رابط ملف JS المخصص -->
  <script src="{{ url_for('static', filename='js/user_portal.js') }}"></script>
</body>

</html>
