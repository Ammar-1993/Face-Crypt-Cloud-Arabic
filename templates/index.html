<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <title>سحابة الملامح المشفرة</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- رابط ملف CSS المخصص -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/user_portal.css') }}">
</head>

<body>
  <div style="text-align:center; margin: 30px 0;">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="FaceCrypt Logo" width="180">
  </div>
  <div class="container">
    <h1>سحابة الملامح المشفرة - بوابة المستخدم</h1>
    <p>تسجيل الدخول الآمن ببصمة الوجه</p>

    <!-- Camera Section -->
    <button id="openCamera" class="btn btn-primary">📷 فتح الكاميرا</button>
    <video id="cameraStream" width="300" autoplay playsinline style="display:none;"></video>
    <button id="captureButton" class="btn btn-warning mt-2" style="display:none;">📸 التقاط</button>
    <button id="stopCameraButton" class="btn btn-secondary mt-2" style="display:none;">✖️ إيقاف الكاميرا</button>

    <!-- Upload Section -->
    <div class="mt-3">
      <input type="file" id="imageUpload" accept="image/*" class="form-control mt-2" />
    </div>

    <!-- Preview -->
    <img id="preview" src="#" alt="معاينة" style="display:none;">

    <!-- Send -->
    <button id="sendButton" class="btn btn-success mt-3">✅ إرسال للتحقق</button>

    <!-- Result -->
    <div id="result" class="mt-3"></div>
  </div>

  <!-- رابط ملف JS المخصص -->
  <script src="{{ url_for('static', filename='js/user_portal.js') }}"></script>
</body>

</html>
