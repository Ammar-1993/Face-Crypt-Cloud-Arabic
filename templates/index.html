<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <title>سحابة الملامح المشفرة</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- رابط ملف CSS المخصص -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/user_portal.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div style="text-align:center; margin: 15px 0;">
    <img src="{{ url_for('static', filename='images/face_crypt_cloud_logo.png') }}" alt="FaceCrypt Logo" width="150">
  </div>
  <div class="container mt-2">
    <h1 class="mb-1">سحابة الملامح المشفرة - بوابة المستخدم</h1>
    <p class="mb-3">تسجيل الدخول الآمن ببصمة الوجه</p>

    <!-- Main Action: Open Camera -->
    <div id="openCameraWrapper" class="d-grid gap-2 col-10 col-md-8 mx-auto mt-4">
      <button id="btnOpenCamera" class="btn btn-modern-primary py-3 shadow-lg">
        <div class="d-flex align-items-center justify-content-center">
          <i class="bi bi-camera-fill fs-3 me-3"></i>
          <div class="text-start">
            <span class="d-block fw-bold fs-4">بدء التحقق من الوجه</span>
            <small class="d-block opacity-75" style="font-size: 0.85rem;">افتح الكاميرا لتسجيل دخول آمن</small>
          </div>
        </div>
      </button>
    </div>

    <!-- Camera and Preview Container -->
    <div id="cameraContainer" class="text-center mt-3">
      <video id="cameraStream" autoplay playsinline style="display:none;"></video>
      <img id="preview" src="#" alt="معاينة" style="display:none;">

      <div class="mt-3 d-flex justify-content-center gap-3">
        <button id="captureButton" class="btn btn-warning btn-lg px-4 py-2 fw-bold shadow-sm" style="display:none;">
          <i class="bi bi-camera-fill me-2"></i> التقاط الصورة
        </button>
        <button id="stopCameraButton" class="btn btn-outline-secondary btn-lg px-4 py-2 fw-bold shadow-sm" style="display:none;">
          <i class="bi bi-x-circle-fill me-2"></i> إغلاق الكاميرا
        </button>
      </div>
    </div>

    <!-- Final Submission and Retake Actions -->
    <div class="d-flex justify-content-center gap-3 mt-3">
      <button id="sendButton" class="btn btn-success btn-lg" style="display:none;">✅ إرسال للتحقق</button>
      <button id="retakeButton" class="btn btn-outline-danger btn-lg" style="display:none;">🔄 إعادة التقاط</button>
      <button type="button" class="btn btn-outline-secondary btn-lg" id="btnCancelCamera" style="display: none;">إلغاء ✖️</button>
    </div>

    <!-- Result -->
    <div id="result" class="mt-2"></div>

    <!-- Security Disclaimer -->
    <div id="securityDisclaimer" class="mt-4 p-3 border rounded shadow-sm bg-light text-start">
      <h6 class="fw-bold text-dark mb-2">
        <i class="bi bi-shield-lock-fill me-1"></i> سياسة حماية الحساب:
      </h6>
      <ul class="list-unstyled mb-0" style="font-size: 1rem; line-height: 1.6;">
        <li class="text-secondary">
          <span class="badge bg-warning text-dark me-1">٣ محاولات فاشلة</span>
          <span>حظر مؤقت لمدة ٥ دقائق.</span>
        </li>
        <li class="text-secondary mt-1">
          <span class="badge bg-danger me-1">٥ محاولات فاشلة</span>
          <span>حظر دائم (يتطلب مراجعة مسؤول النظام).</span>
        </li>
      </ul>
    </div>
  </div>

  <!-- رابط ملف JS المخصص -->
  <script src="{{ url_for('static', filename='js/user_portal.js') }}"></script>
</body>

</html>
